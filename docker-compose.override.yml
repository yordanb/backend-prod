# Docker Compose override for development
version: '3.8'

services:
  api:
    volumes:
      - ./src:/app/src:ro  # Mount source code for live reload
      - ./alembic:/app/alembic:ro
    environment:
      - DEBUG=1
    command: >
      sh -c "
      uvicorn src.main:app --host 0.0.0.0 --port 3030 --reload
      "
